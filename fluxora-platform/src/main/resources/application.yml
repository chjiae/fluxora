server:
  port: ${PLATFORM_PORT:8080}

spring:
  application:
    name: fluxora-platform
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:fluxora}
    username: ${POSTGRES_USERNAME:fluxora}
    password: ${POSTGRES_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 平台安全配置
fluxora:
  security:
    jwt:
      secret: ${JWT_SECRET:fluxora-jwt-secret-key-for-local-development-only}
      expiration-ms: ${JWT_EXPIRATION:86400000}
    apikey:
      # API Key HMAC Pepper：服务器端密钥，参与所有 API Key 哈希计算
      # 生产环境必须通过 APIKEY_PEPPER 环境变量覆盖；建议至少 32 字符随机字符串
      # 该值绝不可写入日志、堆栈、响应或前端；仅用于后端校验
      pepper: ${APIKEY_PEPPER:fluxora-apikey-pepper-for-local-development-only-please-override}
  init:
    admin:
      username: ${INIT_ADMIN_USERNAME:admin}
      password: ${INIT_ADMIN_PASSWORD:Admin@2026!}

management:
  endpoints:
    web:
      exposure:
        include: health
