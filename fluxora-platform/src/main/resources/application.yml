server:
  port: ${PLATFORM_PORT:8080}

spring:
  application:
    name: fluxora-platform
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:fluxora}
    username: ${POSTGRES_USERNAME:fluxora}
    password: ${POSTGRES_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 平台安全配置
fluxora:
  model-discovery:
    # 仅用于本地/Playwright 验收；默认关闭，生产不得启用。
    mock-enabled: ${MODEL_DISCOVERY_MOCK_ENABLED:false}
    mock-models: ${MODEL_DISCOVERY_MOCK_MODELS:gpt-4o,gpt-4o-mini,text-embedding-3-small}
  security:
    jwt:
      secret: ${JWT_SECRET:fluxora-jwt-secret-key-for-local-development-only}
      expiration-ms: ${JWT_EXPIRATION:86400000}
    apikey:
      # API Key HMAC Pepper：服务器端密钥，参与所有 API Key 哈希计算
      # 生产环境必须通过 APIKEY_PEPPER 环境变量覆盖；建议至少 32 字符随机字符串
      # 该值绝不可写入日志、堆栈、响应或前端；仅用于后端校验
      pepper: ${APIKEY_PEPPER:fluxora-apikey-pepper-for-local-development-only-please-override}
    card:
      # 卡密 HMAC Pepper：与 API Key Pepper 独立，提供防御纵深
      # 生产环境必须通过 CARD_PEPPER 环境变量覆盖；建议至少 32 字符随机字符串
      # 该值绝不可写入日志、堆栈、响应或前端；仅用于后端校验
      pepper: ${CARD_PEPPER:fluxora-card-pepper-for-local-development-only-please-override}
      # 单次批量生成卡密上限：防止单请求 OOM 与超长响应；可通过 CARD_BATCH_MAX_COUNT 调整
      batch-max-count: ${CARD_BATCH_MAX_COUNT:1000}
    credential:
      # 仅本地开发默认值：两项均为 Base64 编码的 32 字节测试密钥。
      # 生产环境必须通过 FLUXORA_CREDENTIAL_MASTER_KEY 与
      # FLUXORA_CREDENTIAL_FINGERPRINT_KEY 覆盖，绝不写入真实密钥。
      master-key: ${FLUXORA_CREDENTIAL_MASTER_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      fingerprint-key: ${FLUXORA_CREDENTIAL_FINGERPRINT_KEY:ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=}
      import-max-count: ${CREDENTIAL_IMPORT_MAX_COUNT:1000}
  init:
    admin:
      username: ${INIT_ADMIN_USERNAME:admin}
      password: ${INIT_ADMIN_PASSWORD:Admin@2026!}

management:
  endpoints:
    web:
      exposure:
        include: health
