server:
  port: ${PLATFORM_PORT:8080}

spring:
  application:
    name: fluxora-platform
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:fluxora}
    username: ${POSTGRES_USERNAME:fluxora}
    password: ${POSTGRES_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 平台安全配置
fluxora:
  model-discovery:
    # 仅用于本地/Playwright 验收；默认关闭，生产不得启用。
    mock-enabled: ${MODEL_DISCOVERY_MOCK_ENABLED:false}
    mock-models: ${MODEL_DISCOVERY_MOCK_MODELS:gpt-4o,gpt-4o-mini,text-embedding-3-small}
  security:
    jwt:
      secret: ${JWT_SECRET:fluxora-jwt-secret-key-for-local-development-only}
      expiration-ms: ${JWT_EXPIRATION:86400000}
    apikey:
      # API Key Lookup Secret：对完整 canonical API Key 做 HMAC，供 Gateway 以摘要定位 Redis 快照。
      # 生产环境必须通过 APIKEY_LOOKUP_SECRET 覆盖；该值绝不可进入 PostgreSQL、Redis、日志或响应。
      lookup-secret: ${APIKEY_LOOKUP_SECRET:fluxora-apikey-lookup-secret-for-local-development-only-please-override}
    card:
      # 卡密 HMAC Pepper：与 API Key Pepper 独立，提供防御纵深
      # 生产环境必须通过 CARD_PEPPER 环境变量覆盖；建议至少 32 字符随机字符串
      # 该值绝不可写入日志、堆栈、响应或前端；仅用于后端校验
      pepper: ${CARD_PEPPER:fluxora-card-pepper-for-local-development-only-please-override}
      # 单次批量生成卡密上限：防止单请求 OOM 与超长响应；可通过 CARD_BATCH_MAX_COUNT 调整
      batch-max-count: ${CARD_BATCH_MAX_COUNT:1000}
    credential:
      # 仅本地开发默认值：两项均为 Base64 编码的 32 字节测试密钥。
      # 生产环境必须通过 FLUXORA_CREDENTIAL_MASTER_KEY 与
      # FLUXORA_CREDENTIAL_FINGERPRINT_KEY 覆盖，绝不写入真实密钥。
      master-key: ${FLUXORA_CREDENTIAL_MASTER_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      fingerprint-key: ${FLUXORA_CREDENTIAL_FINGERPRINT_KEY:ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=}
      import-max-count: ${CREDENTIAL_IMPORT_MAX_COUNT:1000}
  init:
    admin:
      username: ${INIT_ADMIN_USERNAME:admin}
      password: ${INIT_ADMIN_PASSWORD:Admin@2026!}
  runtime:
    # Redis 为派生运行时层；关闭时仅停用后台轮询，Gateway 仍必须按 Redis 快照失败关闭。
    enabled: ${RUNTIME_PROJECTOR_ENABLED:true}
    projector-batch-size: ${RUNTIME_PROJECTOR_BATCH_SIZE:100}
    projector-delay-ms: ${RUNTIME_PROJECTOR_DELAY_MS:500}
    time-scan-delay-ms: ${RUNTIME_TIME_SCAN_DELAY_MS:30000}
    recovery-delay-ms: ${RUNTIME_RECOVERY_DELAY_MS:30000}
    invalidation-channel: ${RUNTIME_INVALIDATION_CHANNEL:fluxora:runtime:v1:invalidation}
    credential:
      # Gateway 与 Platform 共享的运行时密钥，仅用于 Redis 敏感快照重加密；不可与数据库主密钥复用。
      encryption-key: ${FLUXORA_RUNTIME_CREDENTIAL_KEY:cnVudGltZS1jcmVkZW50aWFsLWtleS0wMTIzNDU2Nzg=}
  observability:
    # 统一业务时区决定时间范围边界与趋势粒度，禁止混用浏览器或服务器默认时区。
    business-time-zone: ${OBSERVABILITY_BUSINESS_TIME_ZONE:Asia/Shanghai}
    stream-key: ${RELAY_EVENT_STREAM:fluxora:relay-events:v1}
    consumer-group: ${RELAY_EVENT_CONSUMER_GROUP:fluxora-platform-v1}
    stream-poll-delay-ms: ${RELAY_EVENT_POLL_DELAY_MS:500}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
