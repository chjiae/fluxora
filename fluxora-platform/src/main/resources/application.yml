server:
  port: ${PLATFORM_PORT:8080}

spring:
  application:
    name: fluxora-platform
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:fluxora}
    username: ${POSTGRES_USERNAME:fluxora}
    password: ${POSTGRES_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 平台安全配置
fluxora:
  security:
    jwt:
      secret: ${JWT_SECRET:fluxora-jwt-secret-key-for-local-development-only}
      expiration-ms: ${JWT_EXPIRATION:86400000}
  init:
    admin:
      username: ${INIT_ADMIN_USERNAME:admin}
      password: ${INIT_ADMIN_PASSWORD:Admin@2026!}

management:
  endpoints:
    web:
      exposure:
        include: health
