services:
  platform:
    build:
      context: .
      dockerfile: fluxora-platform/Dockerfile
    environment:
      PLATFORM_PORT: ${PLATFORM_PORT:-8080}
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-fluxora}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-fluxora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports: ["${PLATFORM_PORT:-8080}:8080"]
  gateway:
    build:
      context: .
      dockerfile: fluxora-gateway/Dockerfile
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8081}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports: ["${GATEWAY_PORT:-8081}:8081"]
  web:
    build:
      context: fluxora-web
      dockerfile: Dockerfile
    ports: ["${WEB_PORT:-5173}:80"]
