# Fluxora 统一入口 Nginx — 反向代理配置
#
# 职责：
# 1. 作为对外唯一 HTTP 入口，所有客户端请求经此路由到内网服务
# 2. 对 Gateway 多实例使用 Docker 内建 DNS（127.0.0.11）做动态解析与负载均衡
# 3. 对 Gateway 的 SSE/流式路径关闭代理缓冲，避免阻塞大模型流式响应
#
# Docker DNS resolver：每次请求变量化 proxy_pass 都会触发重新解析，
# 从而实现 docker compose up --scale gateway=N 后的实例自动发现。

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    # ---- 健康检查 -----------------------------------------------------------

    # Gateway（AI 中继网关，多实例）
    location = /health {
        set $gateway "gateway:8081";
        proxy_pass http://$gateway;
        proxy_set_header Host $host;
    }

    # Platform（控制台后端，Spring Boot Actuator）
    location = /actuator/health {
        proxy_pass http://platform:8080;
        proxy_set_header Host $host;
    }

    # ---- AI 网关中继（/v1/*）— 多实例动态负载均衡 ---------------------------
    #
    # 路径覆盖：
    #   POST /v1/chat/completions   OpenAI 兼容聊天补全
    #   POST /v1/messages           Anthropic Messages
    #   GET  /v1/models             模型列表
    #
    # 使用变量 proxy_pass 按请求解析 Docker DNS，配合 --scale 实现
    # 实例级轮询；零配置热扩缩：新增实例在 DNS TTL（30s）内自动感知。

    location /v1/ {
        set $gateway "gateway:8081";
        proxy_pass http://$gateway;

        # 通用代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 流式响应：必须关闭缓冲，否则大模型 token 级输出会被 nginx 缓存直到
        # 连接关闭，客户端无法看到逐字生成效果。超时设为 10 分钟以适配长对话。
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;

        # 不缓存上游响应
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    # ---- 控制台管理 API（/api/*）→ Platform 单实例 --------------------------

    location /api/ {
        proxy_pass http://platform:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 控制台 API 不涉及 SSE，保持默认缓冲即可
        proxy_read_timeout 120s;
    }

    # ---- 前端 SPA → web 服务内建 nginx ---------------------------------------
    #
    # web 容器内 nginx 已配置 SPA try_files（/index.html 回退），
    # 此处原样转发即可；所有非 /api/、/v1/、/health 的请求落到这里。

    location / {
        proxy_pass http://web:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 请求体上限（防御性）-----------------------------------------------

    client_max_body_size 10m;
}
